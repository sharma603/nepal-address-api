<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Address API - Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --bg: #0f172a; --card-bg: #1e293b;
            --text: #f8fafc; --text-muted: #94a3b8; --accent: #38bdf8;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card-bg); padding: 2.5rem; border-radius: 1.5rem; width: 100%; max-width: 450px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
        h2 { margin-bottom: 2rem; text-align: center; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        select { width: 100%; padding: 0.8rem; border-radius: 0.6rem; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; transition: border-color 0.3s; cursor: pointer; }
        select:focus { border-color: var(--primary); }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        .result { margin-top: 2rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 0.8rem; font-size: 0.85rem; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Address Selector</h2>
        
        <div class="form-group">
            <label>1. Select Province</label>
            <select id="province">
                <option value="">Choose Province...</option>
            </select>
        </div>

        <div class="form-group">
            <label>2. Select District</label>
            <select id="district" disabled>
                <option value="">Choose District...</option>
            </select>
        </div>

        <div class="form-group">
            <label>3. Select Municipality</label>
            <select id="municipality" disabled>
                <option value="">Choose Municipality...</option>
            </select>
        </div>

        <div id="selectionResult" class="result" style="display: none;">
            <strong>Selection:</strong> <span id="finalText"></span>
        </div>
    </div>

    <script>
        // API Base URL (Pointing to your local files for testing, switch to GitHub URL later)
        const BASE_URL = '../api/v1';

        const provinceEl = document.getElementById('province');
        const districtEl = document.getElementById('district');
        const municipalityEl = document.getElementById('municipality');
        const resultEl = document.getElementById('selectionResult');
        const finalText = document.getElementById('finalText');

        // 1. Initialize Provinces
        async function loadProvinces() {
            try {
                const res = await fetch(`${BASE_URL}/provinces.json`);
                const data = await res.json();
                data.provinces.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = `${p.name} (${p.name_np})`;
                    provinceEl.appendChild(opt);
                });
            } catch (err) { console.error("Failed to load provinces", err); }
        }

        // 2. Load Districts when Province changes
        provinceEl.onchange = async () => {
            const pid = provinceEl.value;
            districtEl.innerHTML = '<option value="">Choose District...</option>';
            municipalityEl.innerHTML = '<option value="">Choose Municipality...</option>';
            districtEl.disabled = true;
            municipalityEl.disabled = true;
            resultEl.style.display = 'none';

            if (!pid) return;

            try {
                const res = await fetch(`${BASE_URL}/districts/province-${pid}.json`);
                const data = await res.json();
                data.districts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.name.toLowerCase().replace(/ /g, '-');
                    opt.dataset.id = d.id;
                    opt.textContent = d.name;
                    districtEl.appendChild(opt);
                });
                districtEl.disabled = false;
            } catch (err) { console.error("Failed to load districts", err); }
        };

        // 3. Load Municipalities when District changes
        districtEl.onchange = async () => {
            const districtSlug = districtEl.value;
            municipalityEl.innerHTML = '<option value="">Choose Municipality...</option>';
            municipalityEl.disabled = true;
            resultEl.style.display = 'none';

            if (!districtSlug) return;

            try {
                const res = await fetch(`${BASE_URL}/municipalities/district-${districtSlug}.json`);
                const data = await res.json();
                data.municipalities.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = `${m.name} (${m.type})`;
                    municipalityEl.appendChild(opt);
                });
                municipalityEl.disabled = false;
            } catch (err) { console.error("Failed to load municipalities", err); }
        };

        // 4. Final selection
        municipalityEl.onchange = () => {
            if (municipalityEl.value) {
                finalText.textContent = `${municipalityEl.options[municipalityEl.selectedIndex].text}, ${districtEl.options[districtEl.selectedIndex].text}, ${provinceEl.options[provinceEl.selectedIndex].text}`;
                resultEl.style.display = 'block';
            }
        };

        loadProvinces();
    </script>
</body>
</html>
